services:
  api:
    build:
      context: ..
      dockerfile: ./backend/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - db
  db:
    build: db
    volumes:
      - db_data:/var/lib/mysql
    expose:
      - 3306
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    develop:
      watch:
        - action: rebuild
          path: ./db/init
volumes:
  db_data:
